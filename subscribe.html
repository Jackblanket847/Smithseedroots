<!-- subscribe.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Subscribe — Smith Seed Roots</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <main>
    <header>
      <h1>Smith Seed Roots — Membership</h1>
      <p>Join our seed community — monthly deliveries & exclusive content.</p>
    </header>

    <section id="plan">
      <h2>Monthly Subscription</h2>
      <p>$12/month — monthly seed packs + newsletter</p>
      <button id="checkoutBtn">Subscribe with Card</button>
    </section>

    <section id="status" hidden>
      <h3>Status</h3>
      <pre id="statusText"></pre>
    </section>

    <footer>
      <small>Contact: <a href="mailto:hello@smithseedroots.shop">hello@smithseedroots.shop</a></small>
    </footer>
  </main>

  <script>
    // DRIVER BOT: small script to handle button & local state
    const PAYMENT_LINK_URL = "https://buy.stripe.com/XXXXXXXXXXXX"; // <-- replace
    const checkoutBtn = document.getElementById('checkoutBtn');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');

    checkoutBtn.addEventListener('click', () => {
      // Log action locally and redirect user to Stripe Payment Link
      const now = new Date().toISOString();
      localStorage.setItem('last_subscribe_attempt', now);
      // optional small analytics (POST to your webhook) - uncomment if you deploy webhook receiver
      /*
      fetch('/.netlify/functions/track', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({event:'subscribe_click', ts: now})
      }).catch(()=>{/* ignore network errors */});
      */
      window.location.href = PAYMENT_LINK_URL;
    });

    // show last attempt (simple driver bot UI)
    const last = localStorage.getItem('last_subscribe_attempt');
    if (last) {
      status.hidden = false;
      statusText.textContent = `Last subscribe click: ${last}`;
    }
  </script>
</body>
</html>
